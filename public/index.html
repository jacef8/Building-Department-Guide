<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Liberty County Building Dept — Permit Assistant</title>
<link rel="manifest" href="/manifest.webmanifest">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<body>
<style>
  :root {
    --navy: #1B3A6B;
    --navy-dark: #0D1E3D;
    --gold: #D9A520;
    --gold-light: #FBEBBE;
    --bg: #EEF1F8;
    --panel: #FFFFFF;
    --border: #E1E5EF;
    --text: #12141A;
    --text-mute: #6B7280;
    --form-green: #3A6B2E;
    --law-violet: #5B3A8E;
    --danger: #B03A2E;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, Helvetica, Arial, sans-serif;
    --shadow-sm: 0 2px 6px rgba(16, 24, 40, 0.08);
    --shadow-md: 0 8px 24px rgba(16, 24, 40, 0.12);
    --shadow-lg: 0 20px 50px rgba(16, 24, 40, 0.20);
  }
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: transparent;
  }
  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-height: 100vh;
    font-family: var(--font);
    font-size: 17px;
    color: var(--text);
    background: radial-gradient(circle at 15% 0%, #F5F7FC 0%, var(--bg) 55%);
    overflow: hidden;
  }

  /* ── Header ───────────────────────────────────────────── */
  .header {
    background: linear-gradient(120deg, var(--navy) 0%, var(--navy-dark) 100%);
    color: white;
    padding: 32px 34px 28px;
    display: flex;
    align-items: center;
    gap: 20px;
    position: relative;
    overflow: hidden;
  }
  .header::after {
    content: "";
    position: absolute;
    top: -60%; right: -10%;
    width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(217,165,32,0.28) 0%, transparent 70%);
    pointer-events: none;
  }
  .header .bell {
    width: 60px; height: 60px;
    border-radius: 18px;
    background: var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    flex-shrink: 0;
    box-shadow: var(--shadow-md);
    position: relative;
    z-index: 1;
  }
  .header .titles { line-height: 1.3; position: relative; z-index: 1; }
  .header .eyebrow {
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold-light);
    font-weight: 800;
  }
  .header h1 {
    margin: 5px 0 0;
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .header .badge {
    margin-left: auto;
    font-size: 13px;
    background: rgba(255,255,255,0.18);
    padding: 9px 18px;
    border-radius: 100px;
    letter-spacing: 0.02em;
    white-space: nowrap;
    font-weight: 700;
    position: relative;
    z-index: 1;
    backdrop-filter: blur(6px);
  }

  /* ── Source / tools strip ─────────────────────────────── */
  .sources-strip {
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 16px 34px;
    display: flex;
    gap: 12px;
    align-items: center;
    font-size: 14.5px;
    color: var(--text-mute);
    position: relative;
  }
  .kb-toggle {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 10px 18px;
    font-size: 14.5px;
    font-weight: 700;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .kb-toggle:hover { border-color: var(--gold); background: var(--gold-light); }
  .kb-toggle .count-badge {
    background: var(--navy);
    color: white;
    font-size: 12px;
    font-weight: 700;
    padding: 2px 9px;
    border-radius: 100px;
  }
  .kb-toggle .chevron { transition: transform 0.15s ease; font-size: 11px; color: var(--text-mute); }
  .kb-toggle.open .chevron { transform: rotate(180deg); }

  .kb-dropdown {
    position: absolute;
    top: calc(100% + 6px);
    left: 34px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: var(--shadow-lg);
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 20;
    min-width: 260px;
  }
  .kb-dropdown .doc-chip {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 9px 14px;
    display: flex;
    align-items: center;
    gap: 9px;
    font-weight: 600;
    font-size: 14px;
    color: var(--text);
    text-decoration: none;
    transition: all 0.15s ease;
  }
  a.doc-chip { cursor: pointer; }
  a.doc-chip:hover { border-color: var(--gold); background: var(--gold-light); transform: translateX(2px); }
  .doc-chip .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }
  .doc-chip .chip-arrow { margin-left: auto; color: var(--text-mute); font-size: 13px; }
  a.doc-chip:hover .chip-arrow { color: var(--navy); }

  .parcel-link {
    margin-left: auto;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--navy);
    color: white;
    text-decoration: none;
    padding: 11px 20px;
    border-radius: 100px;
    font-size: 14px;
    font-weight: 700;
    box-shadow: var(--shadow-sm);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    white-space: nowrap;
  }
  .parcel-link:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); background: var(--navy-dark); }

  /* ── Chat area ────────────────────────────────────────── */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 34px;
    display: flex;
    flex-direction: column;
    gap: 26px;
  }
  .msg { display: flex; gap: 16px; max-width: 92%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg .avatar {
    width: 42px; height: 42px; border-radius: 13px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800;
    margin-top: 2px;
    box-shadow: var(--shadow-sm);
  }
  .msg.assistant .avatar { background: var(--navy); color: white; }
  .msg.user .avatar { background: var(--gold); color: white; }
  .bubble {
    padding: 20px 24px;
    border-radius: 20px;
    font-size: 17px;
    line-height: 1.65;
  }
  .msg.assistant .bubble {
    background: white;
    border-left: 4px solid var(--gold);
    box-shadow: var(--shadow-md);
  }
  .msg.user .bubble {
    background: var(--navy);
    color: white;
  }
  .bubble p { margin: 0 0 12px; }
  .bubble p:last-child { margin-bottom: 0; }
  .citation-tag {
    display: inline-block;
    font-size: 12.5px;
    font-weight: 600;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--navy);
    padding: 4px 12px;
    border-radius: 100px;
    margin: 4px 5px 0 0;
    text-decoration: none;
    transition: all 0.15s ease;
  }
  a.citation-tag { cursor: pointer; }
  a.citation-tag:hover { background: var(--gold-light); border-color: var(--gold); transform: translateY(-1px); }
  .msg.assistant .sources-used {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px dashed var(--border);
  }

  .empty-state {
    margin: auto;
    text-align: center;
    color: var(--text-mute);
    max-width: 520px;
  }
  .empty-state .icon {
    font-size: 30px;
    margin: 0 auto 20px;
    width: 84px; height: 84px;
    display: flex; align-items: center; justify-content: center;
    background: white;
    border-radius: 24px;
    box-shadow: var(--shadow-md);
  }
  .empty-state h2 { color: var(--navy); font-size: 26px; margin: 0 0 10px; font-weight: 800; letter-spacing: -0.02em; }
  .empty-state p { font-size: 16px; line-height: 1.65; margin: 0 0 24px; }
  .suggestion-row { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
  .suggestion-chip {
    background: white;
    border: 1px solid var(--border);
    color: var(--navy);
    font-size: 14.5px;
    font-weight: 600;
    padding: 12px 20px;
    border-radius: 100px;
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: all 0.15s ease;
  }
  .suggestion-chip:hover { border-color: var(--gold); background: var(--gold-light); transform: translateY(-2px); box-shadow: var(--shadow-md); }

  .typing { display: flex; gap: 6px; padding: 8px 0; }
  .typing span {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text-mute);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-4px); opacity: 1; } }

  /* ── Input ────────────────────────────────────────────── */
  .input-bar {
    background: white;
    border-top: 1px solid var(--border);
    padding: 22px 30px;
    display: flex;
    gap: 14px;
    align-items: center;
  }
  .input-bar textarea {
    flex: 1;
    resize: none;
    border: 2px solid var(--border);
    border-radius: 100px;
    padding: 16px 24px;
    font-family: var(--font);
    font-size: 17px;
    line-height: 1.3;
    max-height: 96px;
    outline: none;
    color: var(--text);
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .input-bar textarea:focus { border-color: var(--navy); box-shadow: 0 0 0 4px rgba(27,58,107,0.08); }
  .input-bar button {
    background: var(--navy);
    color: white;
    border: none;
    border-radius: 100px;
    padding: 0 28px;
    height: 56px;
    font-size: 15.5px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: background 0.15s ease, transform 0.15s ease;
    flex-shrink: 0;
  }
  .input-bar button:hover:not(:disabled) { background: var(--navy-dark); transform: translateY(-2px); }
  .input-bar button:disabled { background: #A9B4C4; cursor: not-allowed; transform: none; }

  .disclaimer {
    font-size: 12.5px;
    color: var(--text-mute);
    text-align: center;
    padding: 10px 20px 20px;
    background: white;
  }

  .error-banner {
    background: #FDECEC;
    border: 1px solid var(--danger);
    color: var(--danger);
    font-size: 14.5px;
    padding: 15px 18px;
    border-radius: 16px;
    margin: 0 30px 6px;
    line-height: 1.5;
    font-weight: 500;
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: #C7CEDA; border-radius: 8px; }
</style>

<div class="app" id="app"></div>

<script>
// ══════════════════════════════════════════════════════════════════════
// KNOWLEDGE BASE — extracted from the Building Department Guide (v3, rev.
// July 2026) and the HB 803 Legislative Update Memo. Each entry is one
// retrievable chunk with a source label so answers can be cited.
// ══════════════════════════════════════════════════════════════════════
// Source documents behind each knowledge-base entry. County-hosted
// documents link straight to the official site (always current, no
// duplicate to maintain); internal-only documents are served as static
// files from this same app's /docs folder.
const DOC_LINKS = {
  'Building Guide': '/docs/building-department-guide.pdf',
  'HB 803 Memo': '/docs/hb803-legislative-memo.pdf',
  '2026 Fee Schedule': '/docs/2026-fee-schedule.pdf',
  'Comprehensive Plan': '/docs/comprehensive-plan.pdf',
  'Land Development Code': '/docs/land-development-code.pdf'
};

const KNOWLEDGE_BASE = [
  { source: "Building Guide", section: "I. New Construction — Intake Rules", page: 1, text:
    "For new construction, verify: (1) Septic/Health Dept — if no city sewer, applicant must provide a Septic Construction Permit or Existing System Approval from the Health Department before the building application is accepted. (2) Notice of Commencement — required if job value exceeds $2,500; must be recorded with the Clerk of Court and posted on the job site before the first inspection is scheduled. (3) Setbacks — Residential (Low Density): Front 20 ft, Side 20 ft, Rear 20 ft. Commercial/High-Density: Front 20 ft, Side 10 ft (20 ft for Commercial), Rear 10 ft (20 ft for Commercial)." },
  { source: "Building Guide", section: "I. New Construction — Fees", page: 1, text:
    "Residential Building Permit: $0.75/sq ft. Commercial Building Permit: $0.85/sq ft. Plumbing, HVAC, Gas & Mechanical: $150.00 flat. Fire Suppression/Hood/Sprinkler System: $100.00 each. Pre-Manufactured ADU (Accessory Dwelling Unit): $150.00 flat. ADU projects also require a $100.00 Tier 1 Site Plan Review to verify setbacks. Florida Law (FS 320.8249) requires a Licensed Mobile Home Installer to perform the physical setup even under an owner-builder exemption." },
  { source: "Building Guide", section: "I. New Construction — Required Forms", page: 1, text:
    "Application for Building Permit is required for every permit type; it captures owner, contractor, valuation, zoning, and utility info, and staff assigns the Permit #, Fee, and surcharges. Notice of Commencement is required when job value exceeds $2,500 (or $15,000 for HVAC changeouts); must be recorded with the Clerk of Court under Chapter 713, F.S., and physically posted at the job site before the first inspection. Owner-Builder Affidavit is required whenever a property owner acts as their own general contractor on new construction, including new homes, commercial buildings under $75,000, and farm outbuildings; the owner must appear in person and sign under FS 489.103(7); a false declaration may be a third-degree felony." },
  { source: "Building Guide", section: "I. New Construction — 2026 Legislative Updates", page: 1, text:
    "Under CS/CS/HB 803 (2026, effective July 1, 2026), building permits for single-family dwellings now carry a new statewide 1-year expiration, in addition to the department's existing rule that a permit is void if work isn't commenced within 6 months or is abandoned for 1 year after commencement. How these two rules interact is still pending confirmation from Kenneth Hosford — staff should currently quote both timeframes rather than assume the new rule replaces the old one. HB 803 also created new mandatory permit review deadlines: 5 business days for most existing single-family residential permits under $15,000; 10 business days for CDBG-Disaster Recovery single-family permits; 12 business days for site-specific permits under a master permit; 30 business days for residential under 7,500 sq ft; 60 business days for larger residential, signs, nonresidential under 25,000 sq ft, multifamily (\u226450 units), and site-plan/plat approvals. If the county misses a deadline without a timely deficiency notice, the permit can be deemed approved by law." },
  { source: "Building Guide", section: "II. Electrical — Fees & Form", page: 3, text:
    "Electrical fees: Residential New Service/Upgrades $150.00, Commercial New Service/Upgrades $200.00, Outlets and Switches $50.00, Solar/Generator (Panels and Wiring) $100.00. The Electrical Affidavit is required when a property owner pulls their own electrical permit for site power only (e.g., a power pole to a vacant lot) — not connected to any habitable structure. The owner swears the service will NOT connect to a residence, mobile home, camper, RV, or living structure, and that a separate permit/inspection is required before it can. A whole-home generator needs BOTH an Electrical permit and a Gas permit with separate inspections. Solar wiring must be performed by a licensed electrical contractor even under an owner-builder exemption." },
  { source: "Building Guide", section: "III. Renovations — Exemptions & Forms", page: 4, text:
    "The $7,500 Residential Exemption (HB 803, effective July 1, 2026): work on a single-family home valued under $7,500 does not require a permit if strictly cosmetic/non-structural (flooring, cabinets, painting, drywall finishing); a Written Request for Exemption must be submitted. Electrical, plumbing, mechanical, gas, or structural work always requires a permit regardless of cost. The exemption is void in flood hazard areas, and splitting a project to duck the threshold is illegal. A SEPARATE exemption also applies to temporary residential hurricane/flood walls meeting specified standards, with no dollar threshold — pending confirmation from Kenneth Hosford on which standard applies before staff waive a permit for this. General Affidavit is a flexible notarized statement used for exemption declarations or other sworn statements without a specialized form. The Owner-Builder Affidavit also applies to renovation work (plumbing, mechanical, gas, structural improvements) — same in-person, notarized requirement as new construction." },
  { source: "Building Guide", section: "III. Renovations — Fees", page: 4, text:
    "Plumbing, Gas & Mechanical — Residential: $150.00. Plumbing, Gas & Mechanical — Commercial: $200.00. Windows & Siding: $50.00 flat. Bedroom additions on a septic system require a Health Department permit due to increased system load." },
  { source: "Building Guide", section: "IV. Mobile Homes — Fees & Form", page: 6, text:
    "Mobile Home Set-Up Permit (all sizes): $300.00 flat, plus a $100.00 Tier 1 Site Plan Review. The $300 fee only covers the block, anchor, and tie-down inspection — electrical hookup requires a separate Residential Electrical permit ($150.00). A Health Department septic approval must be submitted before the application is accepted. The Mobile Home Permit Worksheet (Blocking Plans) is a required 2-page form the licensed installer completes documenting pier spacing, footer/pad sizes, tiedown components, soil test results (pocket penetrometer and torque probe), and weatherproofing, signed under Rule 15C-1/15C-2. All tests must be performed by a Licensed Mobile Home Installer, not the property owner." },
  { source: "Building Guide", section: "IV. Mobile Homes — 2026 Legislative Update", page: 6, text:
    "Under CS/CS/HB 803 (2026, effective July 1, 2026), DBPR may not deny a building permit for certain residential manufactured buildings, and local governments may not adopt or enforce zoning, land use, or development regulations that treat offsite-constructed (manufactured) housing differently than site-built housing. The bill also adds specific permit requirements for placement of manufactured housing on mobile home lots and in single-family zoning districts. Staff should not deny or add extra conditions to a mobile home placement in a single-family zoning district solely because the home is manufactured, if it otherwise meets the same standards as a site-built home. A full zoning-code review with Kenneth Hosford is still pending to confirm Liberty County's code complies." },
  { source: "Building Guide", section: "V. Roofing — Fees & Form", page: 7, text:
    "Roofing Permit: $50.00 for 1 to 1,000 sq ft, $100.00 for 1,000 sq ft and above. The Roof Inspection Affidavit (3rd Party) is required when a third-party inspector, rather than the county inspector, verifies roof deck nailing and/or secondary water barrier installation; it applies the Third-Party Inspection Discount. The inspector (Engineer, Architect, or FS 468 Building Inspector) certifies compliance with the Hurricane Mitigation Retrofit Manual per Section 553.844, F.S., and photos of each roof plane with the permit number/address are required. General Contractors licensed after 1973 without a separate Roofing Contractor license cannot pull or self-perform standalone roofing permits (FS 489.113)." },
  { source: "Building Guide", section: "V. Roofing — 2026 Legislative Update (Private Providers)", page: 7, text:
    "CS/CS/HB 803 (2026) substantially amended Fla. Stat. \u00a7553.791 governing private providers (third-party inspectors), effective July 1, 2026. An owner/contractor may use a private provider at any time without prior conditions and no longer must give advance inspection notice. The county's authority to re-review or re-inspect work a private provider already certified is now much narrower: staff may generally only check private-provider paperwork for completeness, not substantive code compliance, except for local ordinance, floodplain, and site-review matters. For the Roof Inspection Affidavit specifically: once a licensed private provider certifies the roof inspection, the county building official may only re-inspect if there is specific knowledge the inspection wasn't actually performed, and must give the provider written notice of that concern first. An internal policy update on how staff log/process these certifications is still pending Kenneth Hosford's sign-off." },
  { source: "Building Guide", section: "VI. Accessory Buildings — Rules, Fees & Form", page: 8, text:
    "Accessory structures/sheds for single-family or two-family dwellings under 120 sq ft are exempt from Site Plan Review and don't require a structural permit or fee. Fees: Pole Barn (Open) $125.00, Pole Barn (Enclosed, full or partial) $150.00, Portable Sheds/Garages 120-400 sq ft $30.00, over 400 sq ft $50.00. The Pole Barn/Accessory Structure Affidavit (No Wastewater) is required when the owner declares NO plumbing will be installed — no toilet, sink, or water connection beyond an outside spigot. If plumbing is mentioned, do NOT use this affidavit; the owner must get a Health Department septic permit first. Violating the affidavit lets the County direct the power company to disconnect electric service." },
  { source: "Building Guide", section: "VII. Comprehensive Plan Review — Fees & Form", page: 9, text:
    "Tier 1 Site Plan Review: $100.00. Tier 2: $350.00. Property Split Review: $150.00. Comprehensive Plan Amendment (Small-Scale, under 10 acres): $1,500.00; (Large-Scale, over 10 acres): $5,000.00. Amendment to Land Development Regulations: $1,500.00. Subdivision Plat Approval: $1,000.00. Special Exception: $1,000.00. Variance: $350.00. Other Conditional Uses: $2,000.00. Special Temporary Use Permit — Commission Issued: $200.00; Staff Issued: $50.00. The 911 Address Request form is required whenever a new address is needed, or an existing address needs confirming/correcting — common for new construction, mobile home placement, or a power pole on a vacant lot. A confirmed 911 address is required before any inspection and before a Certificate of Occupancy is issued." },
  { source: "Building Guide", section: "VII. Zoning Tips — Alcohol & River Buffers", page: 9, text:
    "Any alcohol establishment (e.g., a package store) in a commercial zone requires a Conditional Use/Special Exception ($1,000.00) before the Board of Adjustment; if the property line is within 1,000 feet of a school, church, public playground, or residential district, it faces automatic statutory denial. Structures near the Apalachicola River, Ochlockonee River, Telogia Creek, or New River must clear a mandatory 75-foot native vegetation buffer from the ordinary high-water line, regardless of the structure's size — even a shed under the 120 sq ft exemption must still clear this buffer, verified via a $100.00 Tier 1 Site Plan Review." },
  { source: "Building Guide", section: "VIII. Miscellaneous — Fees & 2026 Update", page: 10, text:
    "Decks and Ramps: $100.00. Sign Permit: $100.00. Swimming Pool (all sizes): $100.00 — Florida Statute 489.103(6) excludes in-ground swimming pools from the owner-builder exemption; a Licensed Commercial Pool/Spa Contractor (CPC) is legally required. Communication Tower (Conditional Land Use): $3,500.00 + $5,000 refundable deposit. Co-Location on Existing Tower: $750.00. Under CS/CS/HB 803 (2026), a retaining wall spanning more than one lot or parcel now requires a single building permit covering the project as a whole, not a separate permit per parcel." },
  { source: "Building Guide", section: "IX. Fee Modifiers & 2026 Legislative Updates", page: 11, text:
    "Plan Review Fee — Residential: $100.00; Commercial: $200.00. Third-Party Inspection Discount: 40% off permit fee (current department rate). Renewal Fee: 25% of original permit fee. Penalty for work started before permit issued: double the permit fee. Under CS/CS/HB 803 (2026), commercial permit fee reductions for private-provider use are now a statutory minimum — at least 25% off when a private provider does either plan review or inspection, at least 50% off when they do both; failing to apply the minimum forfeits the county's ability to collect any fee on that project. It's still pending review with Lisa/Shaula and Kenneth Hosford whether the department's flat 40% rate satisfies this for commercial private-provider projects. Separately, HB 803 restricts inspection fees from being based on project valuation — they must instead reflect actual cost of providing inspection services. Whether the county's $0.75/sq ft (Residential) and $0.85/sq ft (Commercial) building permit fees are affected is a pending fee-methodology question for Kenneth Hosford and finance, not something to resolve at the counter." },
  { source: "Building Guide", section: "X. Glossary — HOA & Statewide Form Note", page: 12, text:

// Simple keyword-overlap retrieval — good enough for a knowledge base
// this size. Swap for real embeddings if the corpus grows much larger.
// ══════════════════════════════════════════════════════════════════════
const STOPWORDS = new Set(['a','an','the','is','are','was','were','be','been','being','to','of','and','or','in','on','at','for','with','by','from','as','that','this','it','do','does','did','can','could','should','would','will','shall','what','when','where','who','how','why','if','my','me','i','we','our','you','your','their','they']);

function tokenize(str) {
  return str.toLowerCase().replace(/[^a-z0-9$.\s]/g, ' ').split(/\s+/).filter(w => w.length > 1 && !STOPWORDS.has(w));
}

function retrieveChunks(query, topN = 5) {
  const qTokens = tokenize(query);
  const scored = KNOWLEDGE_BASE.map(chunk => {
    const chunkTokens = tokenize(chunk.section + ' ' + chunk.text);
    let score = 0;
    qTokens.forEach(qt => {
      chunkTokens.forEach(ct => {
        if (ct === qt) score += 2;
        else if (ct.includes(qt) || qt.includes(ct)) score += 0.5;
      });
    });
    return { chunk, score };
  });
  scored.sort((a, b) => b.score - a.score);
  return scored.filter(s => s.score > 0).slice(0, topN).map(s => s.chunk);
}

// Parcel lookup — Florida DOR statewide parcel data (via server proxy)
// A message is treated as a parcel lookup if it's mostly digits/dashes/
// dots and doesn't look like a normal question (no letters other than
// what a parcel number legitimately contains). This is a deterministic
// heuristic, not an AI guess, so it's predictable to test and debug.
// ══════════════════════════════════════════════════════════════════════
function looksLikeParcelId(input) {
  const trimmed = input.trim();
  if (trimmed.length < 5) return false;
  // Parcel IDs: digits, dashes, dots, occasional spaces — no other letters/words
  return /^[0-9\-\.\s]+$/.test(trimmed) && /\d{4,}/.test(trimmed.replace(/[\-\.\s]/g, ''));
}

function formatParcelResult(features, searchedFor) {
  if (!features || features.length === 0) {
    return `No parcel matching "${searchedFor}" was found in the Florida DOR statewide parcel data for Liberty County. Double-check the parcel number, or use the "Look up a parcel" link to search directly on the county's own Property Appraiser site (qPublic) — that's the live, authoritative source.`;
  }

  const lines = [];
  if (features.length > 1) {
    lines.push(`Found ${features.length} matching parcels — showing the closest matches:\n`);
  }

  features.forEach((p, i) => {
    const useCode = (p.DOR_UC || '').toString().padStart(2, '0');
    const useLabel = DOR_USE_CODES[useCode] || 'Unknown / not in standard DOR schedule';
    const addr = [p.PHY_ADDR1, p.PHY_CITY, p.PHY_ZIPCD].filter(Boolean).join(', ');
    const owner = p.OWN_NAME || 'Not on file';
    const legal = p.S_LEGAL || 'Not on file';
    const acreage = p.LND_SQFOOT ? (p.LND_SQFOOT / 43560).toFixed(2) + ' acres' : 'Not on file';
    const jv = p.JV ? '$' + Number(p.JV).toLocaleString() : 'Not on file';

    lines.push(
      (features.length > 1 ? `${i + 1}. ` : '') + `Parcel ${p.PARCEL_ID || searchedFor}\n` +
      `Designation (DOR Use Code ${useCode}): ${useLabel}\n` +
      `Site Address: ${addr || 'Not on file'}\n` +
      `Owner of Record: ${owner}\n` +
      `Legal Description: ${legal}\n` +
      `Land Area: ${acreage}\n` +
      `Just Value (most recent roll): ${jv}` +
      (p.NO_RES_UNT ? `\nResidential Units: ${p.NO_RES_UNT}` : '') +
      (p.ACT_YR_BLT ? `\nYear Built: ${p.ACT_YR_BLT}` : '')
    );
  });

  lines.push(
    '\nThis is from the Florida Dept. of Revenue\'s statewide tax-roll data (updated a few times a year, not live) — treat the DOR Use Code as the designation, not the county\'s zoning district specifically. For anything legally significant, confirm on the county Property Appraiser\'s own site.'
  );

  return lines.join('\n\n');
}

function pickRandomSuggestions() {
  const categories = Object.keys(SUGGESTION_POOL);
  const picks = categories.map(cat => {
    const options = SUGGESTION_POOL[cat];
    return options[Math.floor(Math.random() * options.length)];
  });
  // shuffle so the category order isn't always the same either
  for (let i = picks.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [picks[i], picks[j]] = [picks[j], picks[i]];
  }
  return picks;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function formatBubble(text) {
  return escapeHtml(text)
    .split(/\n\n+/)
    .map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`)
    .join('');
}

      ${messages.length === 0 ? `
        <div class="empty-state">
          <div class="icon">\u{1F4DA}</div>
          <h2>Ask about permits, fees, or forms</h2>
          <p>Answers only from the Building Department Guide, the Comprehensive Plan, the Land Development Code, the Fee Schedule, and the HB 803 memo. Type a parcel number directly to pull its designation from Florida's statewide parcel data.</p>
          <div class="suggestion-row">
            ${SUGGESTIONS.map(s => `<button class="suggestion-chip" onclick="askSuggestion(this)">${escapeHtml(s)}</button>`).join('')}
          </div>
        </div>
      ` : messages.map(m => `
        <div class="msg ${m.role}">
          <div class="avatar">${m.role === 'user' ? 'You' : 'AI'}</div>
          <div class="bubble">
            ${formatBubble(m.content)}
            ${m.sources && m.sources.length ? `
              <div class="sources-used">
                ${m.sources.map(s => {
                  const label = `${escapeHtml(s.source)} \u2014 ${escapeHtml(s.section)}`;
                  const url = DOC_LINKS[s.source];
                  if (url && s.page) {
                    return `<a class="citation-tag" href="${url}#page=${s.page}" target="_blank" rel="noopener">${label}</a>`;
                  } else if (url) {
                    return `<a class="citation-tag" href="${url}" target="_blank" rel="noopener">${label}</a>`;
                  }
                  return `<span class="citation-tag">${label}</span>`;
                }).join('')}
              </div>
            ` : ''}
          </div>
        </div>
      `).join('')}
      ${isLoading ? `
        <div class="msg assistant">
          <div class="avatar">AI</div>
          <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>
        </div>
      ` : ''}
    </div>
    ${lastError ? `<div class="error-banner">${escapeHtml(lastError)}</div>` : ''}
    <div class="input-bar">
      <textarea id="questionInput" rows="1" placeholder="Ask a question, or type a parcel number to look it up..." onkeydown="handleKeydown(event)"></textarea>
      <button id="sendBtn" onclick="sendQuestion()" ${isLoading ? 'disabled' : ''}>${isLoading ? 'Thinking\u2026' : 'Ask'}</button>
    </div>
    <div class="disclaimer">Answers are drawn from Liberty County Building Department documents for general guidance only. For an official determination on any permit, fee, or code question, contact the Building Department directly.</div>
  `;

  const chatArea = document.getElementById('chatArea');
  if (chatArea) chatArea.scrollTop = chatArea.scrollHeight;

  const input = document.getElementById('questionInput');
  if (input) input.focus();
}

function toggleKbDropdown(e) {
  if (e) e.stopPropagation();
  kbDropdownOpen = !kbDropdownOpen;
  render();
}

// Close the dropdown if the user clicks anywhere outside it
document.addEventListener('click', (e) => {
  if (!kbDropdownOpen) return;
  if (e.target.closest('.kb-toggle') || e.target.closest('.kb-dropdown')) return;
  kbDropdownOpen = false;
  render();
});

function handleKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendQuestion();
  }
}

function askSuggestion(btn) {
  document.getElementById('questionInput').value = btn.textContent;
  sendQuestion();
}

async function sendQuestion() {
  const input = document.getElementById('questionInput');
  const question = input.value.trim();
  if (!question || isLoading) return;

  lastError = null;
  messages.push({ role: 'user', content: question });
  isLoading = true;
  render();

  if (looksLikeParcelId(question)) {
    await runParcelLookup(question);
  } else {
    await runKnowledgeBaseQuestion(question);
  }

  isLoading = false;
  input.value = '';
  render();
}

async function runParcelLookup(parcelId) {
  try {
    const response = await fetch("/api/parcel", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ parcelId })
    });

    if (!response.ok) {
      const errBody = await response.json().catch(() => ({}));
      throw new Error(errBody.error || `Server responded with status ${response.status}`);
    }

    const data = await response.json();
    const answer = formatParcelResult(data.features, parcelId);
    messages.push({ role: 'assistant', content: answer, sources: [{ source: 'Florida DOR Parcel Data', section: 'Statewide Cadastral (live lookup)' }] });
  } catch (err) {
    lastError = "Couldn't reach the parcel lookup service (" + err.message + "). Try the \"Look up a parcel\" link above to search directly on the county's site instead.";
  }
}

async function runKnowledgeBaseQuestion(question) {
  try {
    const relevantChunks = retrieveChunks(question, 5);
    const contextText = relevantChunks.length
      ? relevantChunks.map(c => `[${c.source} \u2014 ${c.section}]\n${c.text}`).join('\n\n---\n\n')
      : 'No closely matching reference material was found in the knowledge base.';

    const systemInstructions = `You are an internal reference assistant for Liberty County Building Department front desk staff. Answer ONLY using the reference material provided below \u2014 do not use outside knowledge of Florida law or building codes beyond what's given. If the material doesn't contain the answer, say so plainly and suggest who to ask (Kenneth Hosford for legal/statutory questions, Lisa or Shaula for fee/budget questions). Where a rule is marked "pending confirmation," tell the staff member it's not yet settled rather than stating it as final. Keep answers concise and practical \u2014 the way you'd explain it to a coworker at the counter, not a legal memo. Do not repeat the raw reference material back verbatim at length; synthesize it in your own words.

REFERENCE MATERIAL:
${contextText}`;

    const response = await fetch("/api/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        system: systemInstructions,
        question: question
      })
    });

    if (!response.ok) {
      const errBody = await response.json().catch(() => ({}));
      throw new Error(errBody.error || `Server responded with status ${response.status}`);
    }

    const data = await response.json();
    const answer = data.answer || "I didn't get a usable response \u2014 try rephrasing the question.";

    messages.push({ role: 'assistant', content: answer, sources: relevantChunks });
  } catch (err) {
    lastError = "Couldn't reach the assistant backend (" + err.message + "). If you're running this locally, make sure the proxy server is started (npm start) and ANTHROPIC_API_KEY is set.";
  }
}

render();
</script>

<!-- ── PWA: install button + service worker ─────────────────── -->
<button id="installBtn" hidden aria-label="Install app"
  style="position:fixed;right:16px;bottom:16px;z-index:9999;display:flex;align-items:center;gap:8px;
         padding:11px 16px;border:0;border-radius:0;cursor:pointer;font:600 15px/1 var(--font,sans-serif);
         color:#0D1E3D;background:#D9A520;box-shadow:0 8px 24px rgba(16,24,40,.28);">
  <span style="font-size:17px;line-height:1;">⤓</span> Install app
</button>
<script>
(function () {
  // Register the service worker (required for installability).
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('/sw.js').catch(function (e) {
        console.warn('SW registration failed:', e);
      });
    });
  }

  var btn = document.getElementById('installBtn');
  var deferred = null;

  // Chrome / Edge / Android: capture the install prompt and surface our button.
  window.addEventListener('beforeinstallprompt', function (e) {
    e.preventDefault();
    deferred = e;
    if (btn) btn.hidden = false;
  });
  if (btn) {
    btn.addEventListener('click', function () {
      if (!deferred) return;
      deferred.prompt();
      deferred.userChoice.finally(function () { deferred = null; btn.hidden = true; });
    });
  }
  window.addEventListener('appinstalled', function () { if (btn) btn.hidden = true; });

  // iOS Safari has no install prompt — show a one-time hint on how to add it.
  var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  var standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if (isIOS && !standalone && btn && !localStorage.getItem('bda_ios_hint')) {
    btn.hidden = false;
    btn.innerHTML = '<span style="font-size:17px;line-height:1;">⎋</span> Add to Home Screen';
    btn.addEventListener('click', function () {
      alert('To install: tap the Share button, then "Add to Home Screen".');
      localStorage.setItem('bda_ios_hint', '1');
      btn.hidden = true;
    });
  }
})();
</script>
