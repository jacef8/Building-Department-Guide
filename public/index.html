<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liberty County Building Dept — Staff Reference Assistant</title>
</head>
<body>
<style>
  :root {
    --navy: #1B3A6B;
    --navy-dark: #12274A;
    --gold: #C8960C;
    --gold-light: #F0D98C;
    --bg: #F6F7FA;
    --panel: #FFFFFF;
    --border: #DDE3EC;
    --text: #1A1A1A;
    --text-mute: #5B6472;
    --form-green: #3A6B2E;
    --law-violet: #5B3A8E;
    --danger: #B03A2E;
  }
  * { box-sizing: border-box; }
  body { margin: 0; padding: 0; background: transparent; }
  .app {
    display: flex;
    flex-direction: column;
    height: 100%;
    min-height: 640px;
    font-family: 'Georgia', 'Iowan Old Style', serif;
    color: var(--text);
    background: var(--bg);
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  /* ── Header ───────────────────────────────────────────── */
  .header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-dark) 100%);
    color: white;
    padding: 18px 22px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 3px solid var(--gold);
  }
  .header .bell {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .header .titles { line-height: 1.25; }
  .header .eyebrow {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 10.5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold-light);
    font-weight: 600;
  }
  .header h1 {
    margin: 2px 0 0;
    font-size: 19px;
    font-weight: 700;
  }
  .header .badge {
    margin-left: auto;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 10.5px;
    background: rgba(255,255,255,0.14);
    padding: 5px 10px;
    border-radius: 100px;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }

  /* ── Source strip ─────────────────────────────────────── */
  .sources-strip {
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 9px 22px;
    display: flex;
    gap: 8px;
    align-items: center;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 11.5px;
    color: var(--text-mute);
    flex-wrap: wrap;
  }
  .sources-strip .doc-chip {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 3px 10px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .doc-chip .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--navy); }

  /* ── Chat area ────────────────────────────────────────── */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 22px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .msg { display: flex; gap: 10px; max-width: 88%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 11px; font-weight: 700;
    margin-top: 2px;
  }
  .msg.assistant .avatar { background: var(--navy); color: white; }
  .msg.user .avatar { background: var(--gold); color: white; }
  .bubble {
    padding: 12px 15px;
    border-radius: 12px;
    font-size: 14.5px;
    line-height: 1.55;
  }
  .msg.assistant .bubble {
    background: white;
    border: 1px solid var(--border);
    border-top-left-radius: 3px;
  }
  .msg.user .bubble {
    background: var(--navy);
    color: white;
    border-top-right-radius: 3px;
  }
  .bubble p { margin: 0 0 8px; }
  .bubble p:last-child { margin-bottom: 0; }
  .citation-tag {
    display: inline-block;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 10.5px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--navy);
    padding: 1px 7px;
    border-radius: 100px;
    margin: 2px 3px 0 0;
  }
  .msg.assistant .sources-used {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed var(--border);
  }

  .empty-state {
    margin: auto;
    text-align: center;
    color: var(--text-mute);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    max-width: 420px;
  }
  .empty-state .icon { font-size: 30px; margin-bottom: 10px; }
  .empty-state h2 { font-family: Georgia, serif; color: var(--navy); font-size: 17px; margin: 0 0 6px; }
  .empty-state p { font-size: 13px; line-height: 1.6; margin: 0 0 14px; }
  .suggestion-row { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; }
  .suggestion-chip {
    background: white;
    border: 1px solid var(--border);
    color: var(--navy);
    font-size: 12px;
    padding: 7px 12px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .suggestion-chip:hover { border-color: var(--gold); background: var(--gold-light); }

  .typing { display: flex; gap: 4px; padding: 4px 0; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-mute);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-4px); opacity: 1; } }

  /* ── Input ────────────────────────────────────────────── */
  .input-bar {
    background: white;
    border-top: 1px solid var(--border);
    padding: 14px 18px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .input-bar textarea {
    flex: 1;
    resize: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 13px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 14px;
    line-height: 1.4;
    max-height: 90px;
    outline: none;
    color: var(--text);
  }
  .input-bar textarea:focus { border-color: var(--navy); }
  .input-bar button {
    background: var(--navy);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 0 18px;
    height: 42px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .input-bar button:hover:not(:disabled) { background: var(--navy-dark); }
  .input-bar button:disabled { background: #A9B4C4; cursor: not-allowed; }

  .disclaimer {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 10.5px;
    color: var(--text-mute);
    text-align: center;
    padding: 6px 18px 12px;
    background: white;
  }

  .error-banner {
    background: #FDECEC;
    border: 1px solid var(--danger);
    color: var(--danger);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 12.5px;
    padding: 10px 14px;
    border-radius: 8px;
    margin: 0 22px 4px;
    line-height: 1.5;
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: #C7CEDA; border-radius: 8px; }
</style>

<div class="app" id="app"></div>

// ══════════════════════════════════════════════════════════════════════
// Simple keyword-overlap retrieval — good enough for a knowledge base
// this size. Swap for real embeddings if the corpus grows much larger.
// ══════════════════════════════════════════════════════════════════════
const STOPWORDS = new Set(['a','an','the','is','are','was','were','be','been','being','to','of','and','or','in','on','at','for','with','by','from','as','that','this','it','do','does','did','can','could','should','would','will','shall','what','when','where','who','how','why','if','my','me','i','we','our','you','your','their','they']);

function tokenize(str) {
  return str.toLowerCase().replace(/[^a-z0-9$.\s]/g, ' ').split(/\s+/).filter(w => w.length > 1 && !STOPWORDS.has(w));
}

function retrieveChunks(query, topN = 5) {
  const qTokens = tokenize(query);
  const scored = KNOWLEDGE_BASE.map(chunk => {
    const chunkTokens = tokenize(chunk.section + ' ' + chunk.text);
    let score = 0;
    qTokens.forEach(qt => {
      chunkTokens.forEach(ct => {
        if (ct === qt) score += 2;
        else if (ct.includes(qt) || qt.includes(ct)) score += 0.5;
      });
    });
    return { chunk, score };
  });
  scored.sort((a, b) => b.score - a.score);
  return scored.filter(s => s.score > 0).slice(0, topN).map(s => s.chunk);
}

// ══════════════════════════════════════════════════════════════════════
// App state & rendering

let messages = [];

  "Does the $7,500 exemption cover a bathroom remodel?",
  "What's the fee for a residential roofing permit?",
  "What changed for private provider roof inspections?"

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function formatBubble(text) {
  return escapeHtml(text)
    .split(/\n\n+/)
    .map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`)
    .join('');
}

          <div class="icon">\u{1F4DA}</div>
          <h2>Ask about permits, fees, or forms</h2>
          <p>This answers only from the Building Department Guide and the 2026 HB 803 legislative memo — nothing outside those two documents.</p>
          <div class="suggestion-row">
            ${SUGGESTIONS.map(s => `<button class="suggestion-chip" onclick="askSuggestion(this)">${escapeHtml(s)}</button>`).join('')}
          </div>
        </div>
      ` : messages.map(m => `
        <div class="msg ${m.role}">
          <div class="avatar">${m.role === 'user' ? 'You' : 'AI'}</div>
          <div class="bubble">
            ${formatBubble(m.content)}
            ${m.sources && m.sources.length ? `
              <div class="sources-used">
                ${m.sources.map(s => `<span class="citation-tag">${escapeHtml(s.source)} \u2014 ${escapeHtml(s.section)}</span>`).join('')}
              </div>
            ` : ''}
          </div>
        </div>
      `).join('')}
      ${isLoading ? `
        <div class="msg assistant">
          <div class="avatar">AI</div>
          <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>
        </div>
      ` : ''}
    </div>
    ${lastError ? `<div class="error-banner">${escapeHtml(lastError)}</div>` : ''}
    <div class="input-bar">
      <textarea id="questionInput" rows="1" placeholder="Ask a question about a permit, fee, or form..." onkeydown="handleKeydown(event)"></textarea>
      <button id="sendBtn" onclick="sendQuestion()" ${isLoading ? 'disabled' : ''}>${isLoading ? 'Thinking\u2026' : 'Ask'}</button>
    </div>
    <div class="disclaimer">Prototype for internal review \u2014 verify anything fee- or deadline-critical with a supervisor before relying on it with the public.</div>
  `;

  const chatArea = document.getElementById('chatArea');
  if (chatArea) chatArea.scrollTop = chatArea.scrollHeight;

  const input = document.getElementById('questionInput');
  if (input) input.focus();
}

function handleKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendQuestion();
  }
}

function askSuggestion(btn) {
  document.getElementById('questionInput').value = btn.textContent;
  sendQuestion();
}

async function sendQuestion() {
  const input = document.getElementById('questionInput');
  const question = input.value.trim();
  if (!question || isLoading) return;

  lastError = null;
  messages.push({ role: 'user', content: question });
  isLoading = true;
  render();

  try {
    const relevantChunks = retrieveChunks(question, 5);
    const contextText = relevantChunks.length
      ? relevantChunks.map(c => `[${c.source} \u2014 ${c.section}]\n${c.text}`).join('\n\n---\n\n')
      : 'No closely matching reference material was found in the knowledge base.';

    const systemInstructions = `You are an internal reference assistant for Liberty County Building Department front desk staff. Answer ONLY using the reference material provided below \u2014 do not use outside knowledge of Florida law or building codes beyond what's given. If the material doesn't contain the answer, say so plainly and suggest who to ask (Kenneth Hosford for legal/statutory questions, Lisa or Shaula for fee/budget questions). Where a rule is marked "pending confirmation," tell the staff member it's not yet settled rather than stating it as final. Keep answers concise and practical \u2014 the way you'd explain it to a coworker at the counter, not a legal memo. Do not repeat the raw reference material back verbatim at length; synthesize it in your own words.

REFERENCE MATERIAL:
${contextText}`;

    const response = await fetch("/api/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        system: systemInstructions,
        question: question
      })
    });

    if (!response.ok) {
      const errBody = await response.json().catch(() => ({}));
      throw new Error(errBody.error || `Server responded with status ${response.status}`);
    }

    const data = await response.json();
    const answer = data.answer || "I didn't get a usable response \u2014 try rephrasing the question.";

    messages.push({ role: 'assistant', content: answer, sources: relevantChunks });
  } catch (err) {
    lastError = "Couldn't reach the assistant backend (" + err.message + "). If you're running this locally, make sure the proxy server is started (npm start) and ANTHROPIC_API_KEY is set.";
  } finally {
    isLoading = false;
    input.value = '';
    render();
  }
}

render();
</script>

</body>
</html>
